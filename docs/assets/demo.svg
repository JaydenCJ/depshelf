<svg xmlns="http://www.w3.org/2000/svg" width="760" height="440" viewBox="0 0 760 440" font-family="Menlo, Consolas, monospace" font-size="14">
  <rect width="760" height="440" rx="10" fill="#101418"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="22" r="6" fill="#27c93f"/>
  <text x="380" y="27" fill="#8b949e" text-anchor="middle" font-size="12">depshelf — one binary, both registries, plain files</text>
  <g fill="#c9d1d9">
    <text x="24" y="62"><tspan fill="#7ee787">$</tspan> depshelf serve --store ./shelf --offline</text>
    <text x="24" y="88" fill="#8b949e">depshelf 0.1.0 listening on <tspan fill="#79c0ff">http://127.0.0.1:8417</tspan> (store ./shelf, offline mode)</text>
    <text x="24" y="110" fill="#8b949e">npm registry: /npm/ — pip index: /pypi/simple/</text>
    <text x="24" y="148"><tspan fill="#7ee787">$</tspan> npm install left-pad --registry http://127.0.0.1:8417/npm</text>
    <text x="24" y="172">added 1 package <tspan fill="#8b949e">(from the shelf — no network)</tspan></text>
    <text x="24" y="204"><tspan fill="#7ee787">$</tspan> pip install --index-url http://127.0.0.1:8417/pypi/simple/ requests</text>
    <text x="24" y="228">Successfully installed requests <tspan fill="#8b949e">(sha256-checked against the index)</tspan></text>
    <text x="24" y="266"><tspan fill="#7ee787">$</tspan> depshelf list --store ./shelf</text>
    <text x="24" y="292" fill="#d2a8ff">ECOSYSTEM  PACKAGE   METADATA  ARTIFACTS  BYTES</text>
    <text x="24" y="314">npm        <tspan fill="#7ee787">left-pad</tspan>  yes       1          12742</text>
    <text x="24" y="336">pypi       <tspan fill="#7ee787">requests</tspan>  yes       1          64928</text>
    <text x="24" y="358" fill="#8b949e">2 packages, 2 artifacts, 77670 bytes</text>
    <text x="24" y="396"><tspan fill="#7ee787">$</tspan> depshelf verify --store ./shelf</text>
    <text x="24" y="420">verified 2 artifacts: <tspan fill="#7ee787">2 ok</tspan>, 0 corrupt, 0 unverified</text>
  </g>
</svg>
